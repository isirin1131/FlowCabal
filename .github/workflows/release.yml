name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds (guaranteed)
          - os: ubuntu-latest
            artifact: flowcabal-linux-x64
            cross: ""
            pkg: deb
          - os: macos-latest
            artifact: flowcabal-darwin-arm64
            cross: ""
            pkg: ""
          - os: windows-latest
            artifact: flowcabal-windows-x64
            cross: ""
            pkg: msi
          # Cross-compiled builds (best-effort)
          - os: ubuntu-latest
            artifact: flowcabal-linux-arm64
            cross: "--target=bun-linux-arm64"
            pkg: deb
          - os: macos-latest
            artifact: flowcabal-darwin-x64
            cross: "--target=bun-darwin-x64"
            pkg: ""

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.cross != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: |
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXT=".exe"; fi
          bun build --compile packages/cli/src/index.ts --outfile "${{ matrix.artifact }}${EXT}" ${{ matrix.cross }}

      - name: Setup WiX
        if: matrix.pkg == 'msi'
        uses: firegiant/gha-setup-wix@v5
        with:
          version: v5.0.0

      - name: Build MSI installer
        if: matrix.pkg == 'msi'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          
          $wxs = @'
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
  <Product Id="*" Name="FlowCabal" Language="1033" Version="VERSION_PLACEHOLDER" Manufacturer="FlowCabal" UpgradeCode="A1B2C3D4-E5F6-4A7B-8C9D-0E1F2A3B4C5D">
    <Package InstallerVersion="500" InstallScope="perMachine" Description="DAG-based AI-assisted novel writing workflow engine" />
    <MajorUpgrade DowngradeErrorMessage="A newer version of FlowCabal is already installed." />
    <MediaTemplate EmbedCab="yes" />
    <Feature Id="ProductFeature" Title="FlowCabal" Level="1">
      <ComponentGroupRef Id="ProductComponents" />
    </Feature>
    <UIRef Id="WixUI_InstallDir" />
    <UIRef Id="WixUI_ErrorProgressText" />
    <Property Id="WIXUI_INSTALLDIR" Value="INSTALLFOLDER" />
    <StandardDirectory Id="ProgramFiles64Folder">
      <Directory Id="INSTALLFOLDER" Name="FlowCabal" />
    </StandardDirectory>
    <Environment Id="AddToPath" Name="PATH" Value="[INSTALLFOLDER]" Permanent="no" Part="last" Action="set" System="yes" />
  </Product>
  <Fragment>
    <ComponentGroup Id="ProductComponents" Directory="INSTALLFOLDER">
      <Component Id="FlowCabalExe" Guid="B2C3D4E5-F6A7-4B8C-9D0E-1F2A3B4C5D6E">
        <File Id="FlowCabalExeFile" Source="flowcabal-windows-x64.exe" KeyPath="yes" />
      </Component>
    </ComponentGroup>
  </Fragment>
</Wix>
'@
          $wxs = $wxs -replace "VERSION_PLACEHOLDER", $version
          $wxs | Out-File -FilePath flowcabal.wxs -Encoding UTF8
          
          candle -nologo -ext WixUIExtension -ext WixUtilExtension flowcabal.wxs -out flowcabal-windows-x64.msi

      - name: Package Linux deb
        if: matrix.pkg == 'deb'
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/flowcabal
          
          cp "${{ matrix.artifact }}" pkg/usr/bin/flowcabal
          chmod +x pkg/usr/bin/flowcabal
          
          cat > pkg/DEBIAN/control <<EOF
Package: flowcabal
Version: ${{ github.ref_name }}
Section: utils
Priority: optional
Architecture: ${{ matrix.artifact == 'flowcabal-linux-x64' && 'amd64' || 'arm64' }}
Depends: libc6
Maintainer: FlowCabal
Description: DAG-based AI-assisted novel writing workflow engine
EOF
          
          cat > pkg/DEBIAN/postinst <<EOF
#!/bin/sh
update-alternatives --install /usr/bin/flowcabal flowcabal /usr/bin/flowcabal 100 || true
EOF
          chmod +x pkg/DEBIAN/postinst
          
          dpkg-deb --build pkg "${{ matrix.artifact }}.deb"

      - name: Package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p FlowCabal.app/Contents/MacOS
          mkdir -p FlowCabal.app/Contents/Resources
          
          cp "${{ matrix.artifact }}" FlowCabal.app/Contents/MacOS/flowcabal
          chmod +x FlowCabal.app/Contents/MacOS/flowcabal
          
          echo '<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>CFBundleExecutable</key>
  <string>flowcabal</string>
  <key>CFBundleIdentifier</key>
  <string>com.flowcabal.cli</string>
  <key>CFBundleName</key>
  <string>FlowCabal</string>
  <key>CFBundleVersion</key>
  <string>${{ github.ref_name }}</string>
</dict>
</plist>' > FlowCabal.app/Contents/Info.plist
          
          zip -r "${{ matrix.artifact }}.app.zip" FlowCabal.app
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.exe
            ${{ matrix.artifact }}.deb
            ${{ matrix.artifact }}.app.zip
          retention-days: 5

      - name: Upload MSI artifact
        if: matrix.pkg == 'msi'
        uses: actions/upload-artifact@v4
        with:
          name: flowcabal-windows-x64-msi
          path: flowcabal-windows-x64.msi
          retention-days: 5

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Make binaries executable
        run: chmod +x dist/flowcabal-linux-* dist/flowcabal-darwin-* 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
