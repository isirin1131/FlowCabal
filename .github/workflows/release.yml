name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds (guaranteed)
          - os: ubuntu-latest
            artifact: flowcabal-linux-x64
            cross: ""
          - os: macos-latest
            artifact: flowcabal-darwin-arm64
            cross: ""
          - os: windows-latest
            artifact: flowcabal-windows-x64.exe
            cross: ""
          # Cross-compiled builds (best-effort)
          - os: ubuntu-latest
            artifact: flowcabal-linux-arm64
            cross: "--target=bun-linux-arm64"
          - os: macos-latest
            artifact: flowcabal-darwin-x64
            cross: "--target=bun-darwin-x64"

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.cross != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build --compile packages/cli/src/index.ts --outfile ${{ matrix.artifact }} ${{ matrix.cross }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Make binaries executable
        run: chmod +x dist/flowcabal-linux-* dist/flowcabal-darwin-* 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
